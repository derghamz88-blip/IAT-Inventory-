  const label=short?`${inf.emoji} ${r.date}${r.notes?' '+r.notes:''}`:`${inf.emoji} ${r.date}${r.notes?' — '+r.notes:''}`;
  return{label,color:inf.color,emoji:inf.emoji,type:t};
}
function calcFormula(ops){
  const tot={};PRODUCTS.forEach(p=>tot[p]={kg:0,pcs:0});
  ops.filter(op=>op.op!=='skip').forEach(op=>{
    const f=findRecord(op.id);if(!f)return;
    const sign=op.op==='+'?1:-1;
    PRODUCTS.filter(p=>!FORMULA_EXCLUDED.includes(p)).forEach(p=>{
      tot[p].kg+=sign*(parseFloat(f.record.items?.[p]?.kg)||0);
      tot[p].pcs+=sign*(parseFloat(f.record.items?.[p]?.pcs)||0);
    });
  });return tot;
}
function allRecords(){
  const arr=[];
  Object.entries(REC_TYPE_MAP).forEach(([key,type])=>{(D[key]||[]).forEach(r=>arr.push({...r,_type:type,_key:key}));});
  return arr.sort((a,b)=>b.date.localeCompare(a.date));
}
function isInFormula(id,fa){return fa.some(op=>op.id===id);}
function addToFormula(fid,id,op){
  const fa=fid==='a'?FA:FB;
  if(op==='remove'){if(fid==='a')FA=FA.filter(o=>o.id!==id);else FB=FB.filter(o=>o.id!==id);}
  else{const i=fa.findIndex(o=>o.id===id);if(i>=0)fa[i].op=op;else fa.push({id,op});}
  saveFormulas();render();
}
function removeFromFormula(fid,id){addToFormula(fid,id,'remove');}
function cycleChip(fid,id,curOp){
  // Cycle: + → - → skip → remove
  const next={'+':'-','-':'skip','skip':'remove'}[curOp]||'remove';
  addToFormula(fid,id,next);
}

function getRCTotals(){
  let chickenKG=0,totalCTN=0,cutsKG=0;
  REC_SIZES.forEach(s=>{
    const c=parseFloat(RC.ctns[s])||0;if(!c)return;
    totalCTN+=c;chickenKG+=c*getSizePcs(s)*(s/1000);

function findProductKey(name,is500){
  const n=name.toLowerCase().trim();
  for(const p of PRODUCTS){
    if(p.toLowerCase()===n)return p;
    if(is500&&p.toLowerCase()===n+' 500')return p;
  }
  for(const p of PRODUCTS){
    const base=p.replace(/ 500$/,'').toLowerCase();
    if(n===base||base.startsWith(n)||n.startsWith(base)){
      if(is500&&p.endsWith(' 500'))return p;
      if(!is500&&!p.endsWith(' 500'))return p;
    }
  }
  return null;
}

function parseInventoryText(text){
  const result={};
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  let driverCandidate=null;
  for(const line of lines){
    if(/IAT Trading|WhatsApp/i.test(line))continue;
    const dm=line.match(/(\d{1,2})\s*[\/\-\.]\s*(\d{1,2})\s*[\/\-\.]\s*(\d{2,4})/);
    if(dm){
      let[,d,m,y]=dm;if(y.length===2)y='20'+y;
      result._date=`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      continue;
    }
    const pm=line.match(/^([a-zA-Z\u0600-\u06FF\s]+?)\s+(\d+(?:\.\d+)?)\s*(pcs?|trays?|treys?|kg|\u0643\u063a|\u0637\u0628\u0642|\u0623\u0637\u0628\u0627\u0642)?$/i);
    if(pm){
      const[,name,qty,unit]=pm;
      const q=parseFloat(qty);
      const u=(unit||'').toLowerCase();
      const is500=/pcs?|trays?|treys?/.test(u);
      const key=findProductKey(name.trim(),is500);
      if(key){result[key]=is500?{pcs:q}:{kg:q};continue;}
    }
    if(!driverCandidate&&/^[a-zA-Z\u0600-\u06FF\s]{2,30}$/.test(line)&&!/return|inventory|waste|receivable/i.test(line)){
      driverCandidate=line.trim();
    }
  }
  if(driverCandidate)result._driver=driverCandidate;
  return result;
}

function extractJSON(text){
  const c=text.replace(/```json|```/g,'').trim();
  try{return JSON.parse(c);}catch(e){}
  const s=c.indexOf('{'),en=c.lastIndexOf('}');
  if(s>=0&&en>s)try{return JSON.parse(c.slice(s,en+1));}catch(ex){}
  throw new Error('Invalid JSON: '+c.substring(0,100));
}

    const prompt='Analyze this Fresh Chicken Receipt Report image. Return ONLY a JSON object with no markdown:\n{"supplier":"name or null","date":"YYYY-MM-DD or null","ctns":{"1300":32,"1350":17},"cuts":{"breast":0,"legs":0,"drum":0,"thigh":0,"thighbl":0,"wings":0,"liver":0,"gizzard":0,"heart":0,"bone":0}}\nNOTE: "tray"/"trey" = 500g pack. cuts values are in KG. Only include sizes/cuts with actual numbers. Omit zero values.';
    let result;
    if(prov==='gemini'){
      const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:file.type,data:b64}},{text:prompt}]}]})
      });
      if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+resp.status);}
      const d=await resp.json();
      result=extractJSON(d.candidates[0].content.parts[0].text);
    } else if(prov==='groq'){
      const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Authorization':'Bearer '+apiKey,'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'meta-llama/llama-4-scout-17b-16e-instruct',
          messages:[{role:'user',content:[
            {type:'image_url',image_url:{url:'data:'+file.type+';base64,'+b64}},
            {type:'text',text:prompt}
          ]}],
          max_tokens:2000
        })
      });
      if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+resp.status);}
      const d=await resp.json();
      result=extractJSON(d.choices[0].message.content);
    } else {
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:prompt}]}]})
      });
      if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+resp.status);}
      const d=await resp.json();
      result=extractJSON(d.content.map(x=>x.text||'').join(''));
    }
    if(result.supplier)RC.supplier=result.supplier;
    if(result.date)RC.date=result.date;
    if(result.ctns)Object.entries(result.ctns).forEach(([k,v])=>{if(v)RC.ctns[k]=String(v);});
    if(result.cuts)Object.entries(result.cuts).forEach(([k,v])=>{if(v&&CUT_PRODUCTS.find(c=>c.key===k))RC.cuts[k]=String(v);});
    render();showToast('✅ Scanned! Please verify.');
  }catch(e){
    if(e.message.includes('401')||e.message.includes('API_KEY')||e.message.includes('auth')){
      alert('❌ API Key غلط!\nتحقق من Settings → 🔑 API Key');
    } else if(e.message.includes('quota')||e.message.includes('429')||e.message.includes('exceeded')){
      alert('⚠️ تجاوزت الحد المجاني\nانتظر دقيقة وحاول ثاني\n\nتأكد إنك أخذت المفتاح من aistudio.google.com وليس cloud console');
    } else {
      alert('Scan error: '+e.message);
    }
  }
}

function calcCWCRow(row){
  let ew=0;
  if(row.sh&&row.sh!=='custom'){const s=SH_DATA.find(x=>x.name===row.sh);ew=s?s.wt:0;}
  else if(row.sh==='custom')ew=parseFloat(row.cwt)||0;
  const n=parseFloat(row.ctns)||0,g=parseFloat(row.gross)||0;
  return{empty:n*ew,net:g>0?g-n*ew:0};
}

function updCWCTotal(){
  let tot=0;CWC_ROWS.forEach(r=>{tot+=calcCWCRow(r).net;});
  const el=document.getElementById('cwc-total');
  if(el)el.innerHTML=`<div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:700">Total Net Weight</span><span style="font-size:17px;font-weight:700;color:#00695C">${tot.toFixed(3)} KG</span></div>`;
  const cmp=parseFloat(document.getElementById('cwc-cmp')?.value)||0;
  const dd=document.getElementById('cwc-diff');
  if(dd&&cmp>0){
    const d=tot-cmp,p=d/cmp*100;dd.style.display='block';
    dd.style.background=Math.abs(d)<0.5?'#E8F5E9':'#FFF3E0';
    dd.innerHTML=`<div style="font-size:11px;color:#546E7A;margin-bottom:3px">Receipt: ${cmp} KG | Net: ${tot.toFixed(3)} KG</div>
      <div style="font-size:16px;font-weight:700;color:${Math.abs(d)<0.5?'#2E7D32':'#E65100'}">${d>=0?'+':''}${d.toFixed(3)} KG (${p>=0?'+':''}${p.toFixed(1)}%)</div>`;
  }else if(dd)dd.style.display='none';
}

function renderDiff(){
  const totA=FA.length?calcFormula(FA):null;
  const totB=FB.length?calcFormula(FB):null;

  let h=`<div class="card" style="border:1.5px solid #FFAB91">
    <h2 style="margin:0 0 6px;font-size:16px;color:#BF360C">⚖️ Difference: Formula B − Formula A</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span class="badge" style="background:#EDE7F6;color:#4527A0">🧮 Formula A: ${FA.length} records</span>
      <span class="badge" style="background:#E0F2F1;color:#00695C">🧮 Formula B: ${FB.length} records</span>
    </div>`;

  if(!totA&&!totB){
    h+=`<div style="color:#90A4AE;font-size:12px">Please add records to Formula A and Formula B first.</div></div>`;return h;
  }
  if(!totA){h+=`<div style="color:#C62828;font-size:12px">⚠️ Formula A is empty</div></div>`;return h;}
  if(!totB){h+=`<div style="color:#C62828;font-size:12px">⚠️ Formula B is empty</div></div>`;return h;}
  h+=`</div>`;

  // Build diff
  const diff={};PRODUCTS.forEach(p=>diff[p]={kg:(totB[p]?.kg||0)-(totA[p]?.kg||0),pcs:(totB[p]?.pcs||0)-(totA[p]?.pcs||0)});
  const vis=PRODUCTS.filter(p=>diff[p].kg!==0||diff[p].pcs!==0);
  const grandA=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totA,p),0);
  const grandB=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totB,p),0);
  const grandD=grandB-grandA;

  h+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#BF360C">⚖️ Difference: B − A</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn" style="background:#1B5E20;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaXLSX('diff')">📊 Excel</button>
        <button class="btn" style="background:#1565C0;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaImage('diff')">🖼️ Image</button>
        <button class="btn" style="background:#C62828;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaPDF('diff')">📄 PDF</button>
        <button class="btn" style="background:#25D366;color:#fff;padding:4px 10px;font-size:11px" onclick="shareFormulaWhatsApp('diff')">💬 WhatsApp</button>
      </div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
      <div style="background:#EDE7F6;padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:#4527A0">${grandA.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Formula A</div></div>
      <div style="display:flex;align-items:center;font-size:18px;color:#546E7A">→</div>
      <div style="background:#E0F2F1;padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:#00695C">${grandB.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Formula B</div></div>
      <div style="display:flex;align-items:center;font-size:18px;color:#546E7A">=</div>
      <div style="background:${grandD>0?'#E8F5E9':grandD<0?'#FFEBEE':'#ECEFF1'};padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:${grandD>0?'#2E7D32':grandD<0?'#C62828':'#546E7A'}">${grandD>=0?'+':''}${grandD.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Diff</div></div>
    </div>
    <div style="border-radius:9px;border:1px solid #ECEFF1;overflow:hidden">
    <table style="width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed">
      <colgroup><col style="width:24px"><col><col style="width:75px"><col style="width:75px"><col style="width:85px"></colgroup>
      <thead><tr style="background:#263238;color:#fff">
        <th style="padding:6px 4px;text-align:center">#</th>
        <th style="padding:6px 5px">Product</th>
        <th style="padding:6px 4px;text-align:center;background:#4527A0CC">A<br><small style="font-weight:400;font-size:9px">Comb KG</small></th>
        <th style="padding:6px 4px;text-align:center;background:#00695CCC">B<br><small style="font-weight:400;font-size:9px">Comb KG</small></th>
        <th style="padding:6px 4px;text-align:center;background:#BF360C">B−A<br><small style="font-weight:400;font-size:9px">Diff</small></th>
      </tr></thead><tbody>`;

  const allVis=PRODUCTS.filter(p=>!C_MAP[p]&&(getTotalKg(totA,p)!==0||getTotalKg(totB,p)!==0));
  allVis.forEach((p,i)=>{
    const ckA=getTotalKg(totA,p);
    const ckB=getTotalKg(totB,p);
    const d=ckB-ckA;
    const dColor=d>0?'#1B5E20':d<0?'#B71C1C':'#9E9E9E';
    h+=`<tr style="background:${i%2===0?'#fff':'#FAFAFA'};border-bottom:1px solid #F0F0F0">
      <td style="padding:4px 3px;color:#BDBDBD;font-size:9px;text-align:center">${PRODUCTS.indexOf(p)+1}</td>
      <td style="padding:4px 5px;font-weight:700;color:#1B5E20;font-size:11px;word-break:break-word">${p}</td>
      <td style="padding:4px 4px;text-align:center;color:${ckA!==0?'#4527A0':'#CFD8DC'}">${ckA!==0?ckA.toFixed(2):'—'}</td>
      <td style="padding:4px 4px;text-align:center;color:${ckB!==0?'#00695C':'#CFD8DC'}">${ckB!==0?ckB.toFixed(2):'—'}</td>
      <td style="padding:4px 4px;text-align:center;font-weight:700;color:${dColor};background:${d>0?'#F1F8E9':d<0?'#FFF5F5':'#F5F5F5'}">${d!==0?(d>0?'+':'')+d.toFixed(2):'—'}</td>
    </tr>`;
  });
  const dTotal=grandD;
  h+=`<tr style="background:#263238;color:#fff;font-weight:700">
    <td colspan="2" style="padding:7px 7px">TOTAL</td>
    <td style="text-align:center;background:#4527A0CC">${grandA.toFixed(2)}</td>
    <td style="text-align:center;background:#00695CCC">${grandB.toFixed(2)}</td>
    <td style="text-align:center;background:#BF360C">${dTotal>=0?'+':''}${dTotal.toFixed(2)}</td>
  </tr></tbody></table></div></div>`;
  return h;
}

function handleStockFile(inp){const f=inp.files[0];if(!f)return;const reader=new FileReader();reader.onload=e=>processStockExcel(e.target.result,f.name);reader.readAsArrayBuffer(f);}
function handleStockDrop(e){e.preventDefault();document.getElementById('uz2')?.classList.remove('drag');const f=e.dataTransfer.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>processStockExcel(ev.target.result,f.name);reader.readAsArrayBuffer(f);}

function processStockExcel(buf,name){
  try{
    const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const result=[],converted={};PRODUCTS.forEach(p=>converted[p]=0);
    for(let i=0;i<rows.length;i++){
      const row=rows[i];
      const rname=String(row[0]||'').trim();
      // Parse numeric value from column B (strip units like KG, CTN, PCS)
      const rawB=String(row[1]||'').trim();
      const qty=parseFloat(rawB.replace(/[^0-9.\-]/g,''))||0;
      if(!rname||!qty)continue;
      if(rname.toLowerCase().includes('item')||rname.toLowerCase().includes('balance')||rname.toLowerCase().includes('quantity'))continue;
      const map=lookupStockMap(rname);
      const entry={name:rname,qty,matched:!!map,product:map?map.p:'',multiplier:map?map.m:0,converted:map?(qty*map.m):0};
      result.push(entry);
      if(map&&qty)converted[map.p]=(converted[map.p]||0)+(qty*map.m);
    }
    const today=new Date().toISOString().split('T')[0];
    UPS={step:'result',fileName:name,date:today,notes:'Sys.Stock',rows:result,converted,unmatched:result.filter(r=>!r.matched)};
  }catch(e){alert('Error: '+e.message);UPS.step='upload';}
  render();
}

function saveStockRec(){
  const items=emptyItems();
  PRODUCTS.forEach(p=>{if((UPS.converted[p]||0)>0){if(C_MAP[p])items[p]={kg:'',pcs:UPS.converted[p].toFixed(0)};else items[p]={kg:UPS.converted[p].toFixed(3),pcs:''};}}); 
  if(!D.stockSummaries)D.stockSummaries=[];
  D.stockSummaries=[{id:gid(),date:UPS.date,notes:UPS.notes||UPS.fileName,items:compactItems(items)},...D.stockSummaries];
  save();UPS.step='upload';UPS.rows=[];render();
}

  if(!S.record.ctns)S.record.ctns={};

    delete S.record.ctns[oldSize];
    S.record.ctns[newVal]=count;
  } else {
    S.record.ctns[oldSize]=parseFloat(countVal)||0;
  }
  const el=document.getElementById('ctn-edit-rows');
  if(el)el.innerHTML=renderCTNEditRows();

// Excel
function processExcel(buf,name){
  try{
    const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const result=[],converted={},unmatched=[];PRODUCTS.forEach(p=>converted[p]=0);
    let start=1;for(let i=0;i<Math.min(rows.length,5);i++){if(rows[i].some(c=>String(c).toLowerCase().includes('name'))){start=i+1;break;}}
    for(let i=start;i<rows.length;i++){const row=rows[i];const rn=String(row[1]||'').trim();const qty=parseFloat(row[2])||0;if(!rn||rn.toLowerCase()==='total')continue;const map=lookupMap(rn);const entry={name:rn,qty,matched:!!map,product:map?map.p:'',multiplier:map?map.m:0,converted:map?(qty*map.m):0};result.push(entry);if(map&&qty>0)converted[map.p]=(converted[map.p]||0)+(qty*map.m);else if(qty>0)unmatched.push({name:rn,qty});}
    UP={step:'result',fileName:name,date:new Date().toISOString().split('T')[0],rows:result,converted,unmatched};
  }catch(e){alert('Error: '+e.message);UP.step='upload';}render();
}
function handleFile(inp){const f=inp.files[0];if(!f)return;const reader=new FileReader();reader.onload=e=>processExcel(e.target.result,f.name);reader.readAsArrayBuffer(f);}
function handleDrop(e){e.preventDefault();document.getElementById('uz')?.classList.remove('drag');const f=e.dataTransfer.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>processExcel(ev.target.result,f.name);reader.readAsArrayBuffer(f);}
function saveSalesRec(){
  const items=emptyItems();
  PRODUCTS.forEach(p=>{if((UP.converted[p]||0)>0){if(C_MAP[p])items[p]={kg:'',pcs:UP.converted[p].toFixed(0)};else items[p]={kg:UP.converted[p].toFixed(3),pcs:''};}}); 
  D.sales=[{id:gid(),date:UP.date,notes:UP.fileName,items:compactItems(items)},...D.sales];
  save();UP.step='upload';UP.rows=[];render();
}

// ─── Generic HTML capture ───────────────────────────
async function captureHTML(html){
  const div=document.createElement('div');
  div.style.cssText='position:fixed;left:-9999px;top:0;z-index:-999;pointer-events:none';
  div.innerHTML=html;document.body.appendChild(div);
  try{
    const canvas=await html2canvas(div.firstChild,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false});
    document.body.removeChild(div);return canvas;
  }catch(e){document.body.removeChild(div);throw e;}
}

// ═══ STORAGE OPTIMIZATION ════════════════════════════
// Only save non-empty items — reduces size by ~85%
function compactItems(items){
  const c={};
  Object.entries(items||{}).forEach(([k,v])=>{
    if((parseFloat(v.kg)||0)>0||(parseFloat(v.pcs)||0)>0)c[k]=v;
  });
  return c;
}
function expandItems(compact){
  const e=emptyItems();
  Object.entries(compact||{}).forEach(([k,v])=>{if(e[k]!==undefined)e[k]=v;});
  return e;
}
function migrateCompact(){
  // Migrate existing data to compact format on first run
  let changed=false;
  ['inventories','receivables','returns','sales'].forEach(key=>{
    D[key]=D[key].map(r=>{
      const c=compactItems(r.items);
      if(Object.keys(c).length<Object.keys(r.items||{}).length){changed=true;return{...r,items:c};}
      return r;
    });
  });
  if(changed)save();
}

// ═══ ONEDRIVE — PKCE OAuth (SPA-compatible, no library) ══
const OD_CLIENT_ID='86182a86-981c-46ab-a5e9-c61d8410c64b';
const OD_REDIRECT='https://derghamz88-blip.github.io/IAT-Inventory-/chicken-inventory.html';

function odRandStr(n){
  const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const a=new Uint8Array(n);crypto.getRandomValues(a);
  return Array.from(a,x=>c[x%c.length]).join('');
}
async function odChallenge(v){
  const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function odGetToken(){
  const t=localStorage.getItem('od-at');
  const e=parseInt(localStorage.getItem('od-ate')||'0');
  return t&&Date.now()<e-60000?t:null;
}

async function odLogin(action){
  const v=odRandStr(64),s=odRandStr(16);
  const ch=await odChallenge(v);
  localStorage.setItem('od-v',v);localStorage.setItem('od-s',s);localStorage.setItem('od-p',action);
  const p=new URLSearchParams({
    client_id:OD_CLIENT_ID,response_type:'code',redirect_uri:OD_REDIRECT,
    scope:'Files.ReadWrite User.Read offline_access',
    state:s,code_challenge:ch,code_challenge_method:'S256',
    response_mode:'fragment' // SPA apps return code in hash (#code=...)
  });
  window.location.href='https://login.microsoftonline.com/consumers/oauth2/v2.0/authorize?'+p;
}

async function checkODCallback(){
  // SPA apps return code in fragment (#code=XXX)
  const hash=window.location.hash;
  const hs=new URLSearchParams(hash.startsWith('#')?hash.slice(1):hash);
  // Also check query string as fallback
  const qs=new URLSearchParams(window.location.search);
  const code=hs.get('code')||qs.get('code');
  const state=hs.get('state')||qs.get('state');
  const error=hs.get('error')||qs.get('error');

  if(error){
    window.history.replaceState({},'',window.location.pathname+'#');
    alert('❌ Microsoft error:\n'+(hs.get('error_description')||qs.get('error_description')||error));
    return;
  }
  if(!code)return;

  // Clear URL
  window.history.replaceState({},'',window.location.pathname);
  // State check skipped - multiple login attempts can cause mismatch

  showToast('🔐 Getting access token...');
  try{
    const r=await fetch('https://login.microsoftonline.com/consumers/oauth2/v2.0/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({
        client_id:OD_CLIENT_ID,grant_type:'authorization_code',
        code,redirect_uri:OD_REDIRECT,
        code_verifier:localStorage.getItem('od-v')||''
      }).toString()
    });
    const t=await r.json();
    if(!r.ok){
      alert('❌ Token error:\n'+(t.error_description||t.error||JSON.stringify(t)));
      return;
    }
    localStorage.setItem('od-at',t.access_token);
    localStorage.setItem('od-ate',String(Date.now()+(t.expires_in||3600)*1000));
    if(t.refresh_token)localStorage.setItem('od-rt',t.refresh_token);
    localStorage.removeItem('od-v');localStorage.removeItem('od-s');
    const action=localStorage.getItem('od-p')||'';localStorage.removeItem('od-p');
    showToast('✅ Connected to OneDrive!');
    if(action==='save')setTimeout(()=>odSaveExec(t.access_token),500);
    else if(action==='load')setTimeout(()=>odLoadExec(t.access_token),500);
    else alert('✅ Logged in! Now press ☁️ to save.');
  }catch(e){
    alert('❌ Network error:\n'+e.message);
  }
}

async function odLoadClick(){

async function odSaveExec(token){
  showToast('☁️ Saving to OneDrive...');
  try{
    const resp=await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/IAT-Inventory/IAT-Inventory-Backup.json:/content',{
      method:'PUT',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:getBackupData()
    });
    if(resp.status===401){localStorage.removeItem('od-at');odLogin('save');return;}
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    showToast('✅ Saved to OneDrive/IAT-Inventory/');
  }catch(e){alert('Save error: '+e.message);}
}

async function odLoadExec(token){
  showToast('📂 Loading from OneDrive...');
  try{
    const lr=await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/IAT-Inventory:/children',{headers:{'Authorization':'Bearer '+token}});
    if(lr.status===401){localStorage.removeItem('od-at');odLogin('load');return;}
    if(!lr.ok){alert('No backup folder found. Save first!');return;}
    const list=await lr.json();
    const files=(list.value||[]).filter(f=>f.name.endsWith('.json')).sort((a,b)=>new Date(b.lastModifiedDateTime)-new Date(a.lastModifiedDateTime));
    if(!files.length){alert('No backup files in OneDrive/IAT-Inventory/');return;}
    const fr=await fetch('https://graph.microsoft.com/v1.0/me/drive/items/'+files[0].id+'/content',{headers:{'Authorization':'Bearer '+token}});
    const data=await fr.json();
    if(!data.version||!data.D){alert('Invalid file');return;}
    if(!confirm('Restore from OneDrive?\nReplaces all current data.'))return;
    applyBackup(data);showToast('✅ Restored from OneDrive!');
  }catch(e){alert('Load error: '+e.message);}
}

function applyBackup(data){
  if(data.PRODUCTS){PRODUCTS=data.PRODUCTS;saveProducts();}
  if(data.MD){MD=data.MD;saveMapping();}
  if(data.SMD){SMD=data.SMD;saveStockMapping();}
  if(data.SH_DATA){SH_DATA=data.SH_DATA;saveSH();}
  if(data.D){D=data.D;save();}
  FA=data.FA||[];FB=data.FB||[];
  saveFormulas();recompute();render();
}

function getBackupData(){
  return JSON.stringify({version:3,exportDate:new Date().toISOString(),PRODUCTS,MD,SMD,SH_DATA,D,FA,FB},null,2);
}

// Stores the file handle in IndexedDB so path is remembered

function openHandleDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('chk-fsh-v1',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('h');
    req.onsuccess=e=>res(e.target.result);
    req.onerror=()=>rej(req.error);
  });
}
async function storeHandle(h){
  const db=await openHandleDB();
  return new Promise(res=>{const tx=db.transaction('h','readwrite');tx.objectStore('h').put(h,'bk');tx.oncomplete=res;});
}
async function getHandle(){
  const db=await openHandleDB();
  return new Promise(res=>{const tx=db.transaction('h');const r=tx.objectStore('h').get('bk');r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});
}
async function clearHandle(){
  const db=await openHandleDB();
  return new Promise(res=>{const tx=db.transaction('h','readwrite');tx.objectStore('h').delete('bk');tx.oncomplete=res;});
}
async function verifyHandle(h,mode){
  try{
    const p=await h.queryPermission({mode});
    if(p==='granted')return true;
    const r=await h.requestPermission({mode});
    return r==='granted';
  }catch{return false;}
}

async function odSave(forceNew=false){
  const data={version:3,exportDate:new Date().toISOString(),PRODUCTS,MD,SMD,SH_DATA,D,FA,FB};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const fname='IAT-Inventory-Backup.json';
  const file=new File([blob],fname,{type:'application/json'});

  // ── Mobile: use native share sheet (includes OneDrive app) ──
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file],title:'IAT Inventory Backup'});
      showToast('📤 Share sheet opened — choose OneDrive!');
    }catch(e){if(e.name!=='AbortError')alert('Error: '+e.message);}
    return;
  }

  // ── Desktop: File System Access API with remembered handle ──
  if(window.showSaveFilePicker){
    const btn=document.getElementById('od-save-btn');
    if(btn){btn.textContent='⏳';btn.disabled=true;}
    try{
      let h=forceNew?null:await getHandle();
      if(h){const ok=await verifyHandle(h,'readwrite');if(!ok)h=null;}
      if(!h){
        h=await window.showSaveFilePicker({
          suggestedName:fname,
          types:[{description:'Inventory Backup',accept:{'application/json':['.json']}}],
        });
        await storeHandle(h);
      }
      const w=await h.createWritable();
      await w.write(json);await w.close();
      showToast('✅ Saved: '+h.name);
    }catch(e){if(e.name!=='AbortError')alert('Save error: '+e.message);}
    if(btn){btn.textContent='☁️';btn.disabled=false;}
    return;
  }

  // ── Fallback: download ──
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('💾 Downloaded — save to OneDrive manually');
}

async function odLoad(forceNew=false){
  // ── Desktop: File System Access API ──
  if(window.showOpenFilePicker){
    const btn=document.getElementById('od-load-btn');
    if(btn){btn.textContent='⏳';btn.disabled=true;}
    try{
      let h=forceNew?null:await getHandle();
      if(h){const ok=await verifyHandle(h,'read');if(!ok)h=null;}
      if(!h){
        const[picked]=await window.showOpenFilePicker({
          types:[{description:'Inventory Backup',accept:{'application/json':['.json']}}],
        });
        h=picked;await storeHandle(h);
      }
      const file=await h.getFile();
      const data=JSON.parse(await file.text());
      if(!data.version||!data.D){alert('Invalid file');return;}
      if(!confirm('Restore from: '+h.name+'?\nReplaces all current data.'))return;
      applyBackup(data);
      showToast('✅ Restored from '+h.name);
    }catch(e){if(e.name!=='AbortError')alert('Load error: '+e.message);}
    if(btn){btn.textContent='📂';btn.disabled=false;}
    return;
  }

  // ── Mobile/Fallback: file input ──
  document.getElementById('fallback-import')?.click();
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#263238;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,.3);white-space:nowrap';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}


function importData(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!data.D){alert('Invalid file format');return;}
      if(!confirm('This will REPLACE all current data. Continue?'))return;
      if(data.PRODUCTS){PRODUCTS=data.PRODUCTS;saveProducts();}
      if(data.MD){MD=data.MD;saveMapping();}
      if(data.D){D=data.D;save();}
      FA=data.FA||[];FB=data.FB||[];
      if(data.SMD){SMD=data.SMD;saveStockMapping();}
      saveFormulas();recompute();
      render();alert('Data restored successfully!');
    }catch(ex){alert('Error: '+ex.message);}
    input.value='';
  };
  reader.readAsText(f);
}
