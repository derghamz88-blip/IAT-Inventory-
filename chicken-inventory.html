.stb.on{background:#455A64;color:#fff}.stb:not(.on){background:#ECEFF1;color:#546E7A}

n',m:0.65},{n:'Fresh whole chicken (pcs) 850g',p:'Chicken',m:0.85},{n:'Fresh whole chicken (pcs) 950g',p:'Chicken',m:0.95},

const TABS_R1=['inventory','receivables','returns','sales','stocksummary'];
const TABS_R2=['records','formulaA','formulaB','diff','settings'];

const TYPE_INFO={
  inventory:    {emoji:'📦',color:'#1565C0',label:'Inventory'},
  receivables:  {emoji:'📥',color:'#2E7D32',label:'Receivable'},
  returns:      {emoji:'🔄',color:'#C62828',label:'Return'},

// ═══ STORAGE KEYS ═══════════════════════════════════
const SK='chk-inv-v3',SK_P='chk-prods-v1',SK_M='chk-map-v1',SK_SM='chk-stk-v1',SK_FA='chk-fa-v1',SK_FB='chk-fb-v1';

// ═══ DYNAMIC PRODUCTS ═══════════════════════════════
let PRODUCTS=[],PARENT_PRODUCTS=[],C_MAP={};
function getParent(n){for(const s of[' 500 FF',' 500']){if(n.endsWith(s)){const p=n.slice(0,-s.length).trim();if(PRODUCTS.includes(p))return p;}}return null;}
function recompute(){C_MAP={};PRODUCTS.forEach(p=>{const r=getParent(p);if(r)C_MAP[p]=r;});PARENT_PRODUCTS=PRODUCTS.filter(p=>!C_MAP[p]);}
function loadProducts(){try{const s=localStorage.getItem(SK_P);PRODUCTS=s?JSON.parse(s):[...DP];}catch(e){PRODUCTS=[...DP];}recompute();}
function saveProducts(){localStorage.setItem(SK_P,JSON.stringify(PRODUCTS));recompute();}

// ═══ DYNAMIC MAPPING (Sales) ════════════════════════
let MD=[];
function loadMapping(){try{const s=localStorage.getItem(SK_M);MD=s?JSON.parse(s):JSON.parse(JSON.stringify(DM));}catch(e){MD=JSON.parse(JSON.stringify(DM));}}
function saveMapping(){localStorage.setItem(SK_M,JSON.stringify(MD));}
function lookupMap(name){const k=name.toLowerCase().trim();return MD.find(m=>m.n.toLowerCase()===k)||null;}

// ═══ STOCK MAPPING (Accounting System) ══════════════
let SMD=[];
function loadStockMapping(){try{const s=localStorage.getItem(SK_SM);SMD=s?JSON.parse(s):JSON.parse(JSON.stringify(DSM));}catch(e){SMD=JSON.parse(JSON.stringify(DSM));}}
function saveStockMapping(){localStorage.setItem(SK_SM,JSON.stringify(SMD));}
function lookupStockMap(name){const k=name.toUpperCase().trim();return SMD.find(m=>m.n.toUpperCase()===k)||null;}

// ═══ STATE & DATA ════════════════════════════════════
let S={tab:'inventory',view:'list',record:null,search:'',expanded:new Set(),
       stab:'products',mapSearch:'',smSearch:'',mapEdit:null,smEdit:null,
       recFilter:'all',faFilter:'all',fbFilter:'all',faFrom:'',faTo:'',fbFrom:'',fbTo:''};
let D={inventories:[],receivables:[],returns:[],sales:[],stockSummaries:[]};
let FA=[],FB=[];
let UP ={step:'upload',fileName:'',date:'',rows:[],converted:{},unmatched:[]};
let UPS={step:'upload',fileName:'',date:'',rows:[],converted:{},unmatched:[]};

function load(){
  try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);D={inventories:d.inventories||[],receivables:d.receivables||[],returns:d.returns||[],sales:d.sales||[],stockSummaries:d.stockSummaries||[]};}}
  catch(e){}
}
function save(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){alert('Storage error!');}}
function loadFormulas(){try{const a=localStorage.getItem(SK_FA),b=localStorage.getItem(SK_FB);FA=a?JSON.parse(a):[];FB=b?JSON.parse(b):[];}catch(e){FA=[];FB=[];}}
function saveFormulas(){localStorage.setItem(SK_FA,JSON.stringify(FA));localStorage.setItem(SK_FB,JSON.stringify(FB));}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function emptyItems(){const o={};PRODUCTS.forEach(p=>o[p]={kg:'',pcs:''});return o;}
function newRec(){return{id:gid(),date:new Date().toISOString().split('T')[0],notes:'',items:emptyItems()};}
function dk(t){
  if(t==='inventory')return'inventories';
  if(t==='receivables')return'receivables';
  if(t==='returns')return'returns';
  if(t==='stocksummary')return'stockSummaries';
  return'sales';
}
function ti(k){return TABS.find(t=>t.key===k);}
function totalKg(r){return PRODUCTS.reduce((s,p)=>s+(parseFloat(r.items?.[p]?.kg)||0),0);}
function filled(r){return PRODUCTS.filter(p=>getVal(r.items,p)>0).length;}
function fmt(n,dec=2){return n!==0?(+n.toFixed(dec)).toString():'—';}
function sf(recs,p,f){return recs.reduce((s,r)=>s+(parseFloat(r.items?.[p]?.[f])||0),0);}
function getVal(items,p){return parseFloat(items?.[p]?.[C_MAP[p]?'pcs':'kg'])||0;}
function getTotalKg(items,p){
  const myKg=parseFloat(items[p]?.kg)||0;
  if(C_MAP[p])return myKg+(parseFloat(items[p]?.pcs)||0)*0.5;
  let t=myKg;PRODUCTS.forEach(c=>{if(C_MAP[c]===p)t+=(parseFloat(items[c]?.kg)||0)+((parseFloat(items[c]?.pcs)||0)*0.5);});
  return t;
}


// ═══ FORMULA HELPERS ════════════════════════════════
const REC_TYPE_MAP={inventories:'inventory',receivables:'receivables',returns:'returns',sales:'sales',stockSummaries:'stocksummary'};

function findRecord(id){
  for(const[key,type] of Object.entries(REC_TYPE_MAP)){
    const r=(D[key]||[]).find(r=>r.id===id);
    if(r)return{record:r,type};
  }return null;
}
function getRecordLabel(id,short=false){
  const f=findRecord(id);if(!f)return'(deleted)';
  const{record:r,type:t}=f;
  const inf=TYPE_INFO[t]||{emoji:'📄',color:'#546E7A'};
  const label=short?`${inf.emoji} ${r.date}${r.notes?' '+r.notes:''}`:`${inf.emoji} ${r.date}${r.notes?' — '+r.notes:''}`;
  return{label,color:inf.color,emoji:inf.emoji,type:t};
}
function calcFormula(ops){
  const tot={};PRODUCTS.forEach(p=>tot[p]={kg:0,pcs:0});
  ops.filter(op=>op.op!=='skip').forEach(op=>{
    const f=findRecord(op.id);if(!f)return;
    const sign=op.op==='+'?1:-1;
    PRODUCTS.forEach(p=>{
      tot[p].kg+=sign*(parseFloat(f.record.items?.[p]?.kg)||0);
      tot[p].pcs+=sign*(parseFloat(f.record.items?.[p]?.pcs)||0);
    });
  });return tot;
}
function allRecords(){
  const arr=[];
  Object.entries(REC_TYPE_MAP).forEach(([key,type])=>{(D[key]||[]).forEach(r=>arr.push({...r,_type:type,_key:key}));});
  return arr.sort((a,b)=>b.date.localeCompare(a.date));
}
function isInFormula(id,fa){return fa.some(op=>op.id===id);}
function addToFormula(fid,id,op){
  const fa=fid==='a'?FA:FB;
  if(op==='remove'){if(fid==='a')FA=FA.filter(o=>o.id!==id);else FB=FB.filter(o=>o.id!==id);}
  else{const i=fa.findIndex(o=>o.id===id);if(i>=0)fa[i].op=op;else fa.push({id,op});}
  saveFormulas();render();
}
function removeFromFormula(fid,id){addToFormula(fid,id,'remove');}
function cycleChip(fid,id,curOp){
  // Cycle: + → - → skip → remove
  const next={'+':'-','-':'skip','skip':'remove'}[curOp]||'remove';
  addToFormula(fid,id,next);
}

// ═══ RENDER MAIN ════════════════════════════════════
const TAB_SCROLL={};let _scrollTarget=null;

function render(){
  const sy=_scrollTarget!==null?_scrollTarget:(window.scrollY||0);
  _scrollTarget=null;
  const{tab,view}=S;
  let h=renderHdr()+renderNav()+'<div class="main">';
  const entryTabs=['inventory','receivables','returns'];
  if(entryTabs.includes(tab)) h+=view==='list'?renderList():renderForm();
  else if(tab==='sales')        h+=view==='form'?renderForm():renderSalesTab();
  else if(tab==='stocksummary') h+=view==='form'?renderForm():renderStockTab();
  else if(tab==='records')      h+=renderRecords();
  else if(tab==='formulaA')     h+=renderFormula('a');
  else if(tab==='formulaB')     h+=renderFormula('b');
  else if(tab==='diff')         h+=renderDiff();
  else if(tab==='settings')     h+=renderSettings();
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  requestAnimationFrame(()=>window.scrollTo(0,sy));
}

function renderHdr(){
  return`<header class="hdr">
    <div style="font-size:22px">🐔</div>
    <div><h1>Chicken Inventory</h1><div class="hdr-sub">Stock Management System</div></div>

// ─── Product Table (compact 4-col) ───────────────
function renderPT(items,readOnly,srch){
  const s=srch.toLowerCase();
  let vis=PRODUCTS.filter(p=>!s||p.toLowerCase().includes(s));
  if(readOnly) vis=vis.filter(p=>getVal(items,p)>0);
  const tKg=PRODUCTS.reduce((a,p)=>a+(parseFloat(items[p]?.kg)||0),0);
  const tComb=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(items,p),0);
  const fCnt=PRODUCTS.filter(p=>getVal(items,p)>0).length;

  let h=`<div style="display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap;align-items:center">
    ${!readOnly?`<input class="srch" id="srch-inp" type="text" placeholder="🔍 Search..." value="${srch}" oninput="updSearch(this.value)">`:''}
    <span class="badge" style="background:#E3F2FD;color:#1565C0">⚖️ ${tKg.toFixed(2)}</span>
    <span class="badge" style="background:#E0F2F1;color:#00695C">🔢 ${tComb.toFixed(2)}</span>
    <span class="badge" style="background:#F3E5F5;color:#6A1B9A">📦 ${fCnt}</span>
  </div>
  <div style="border-radius:9px;border:1px solid #ECEFF1;overflow:hidden">
  <table style="width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed">
    <colgroup><col style="width:24px"><col><col style="width:78px"><col style="width:90px"></colgroup>
    <thead><tr style="background:#263238;color:#fff">
      <th style="padding:6px 4px;text-align:center;font-size:10px">#</th>
      <th style="padding:6px 5px;text-align:left">Product</th>
      <th style="padding:6px 4px;text-align:center">Qty<br><small style="opacity:.6;font-size:9px">kg/pcs</small></th>
      <th style="padding:6px 4px;text-align:center;background:#00695C">Combined<br><small style="opacity:.7;font-size:9px">KG+½pcs</small></th>
    </tr></thead><tbody>`;

  vis.forEach((p,i)=>{
    const is500=!!C_MAP[p];
    const pidx=PRODUCTS.indexOf(p);
    const field=is500?'pcs':'kg';
    const raw=items[p]?.[field]||'';
    const num=parseFloat(raw)||0;
    const hv=num>0;
    const uc=is500?'#7B1FA2':'#1565C0';
    const ul=is500?'pcs':'kg';
    const nameHtml=is500?`<div style="color:#7B1FA2;font-size:11px;word-break:break-word">${p}</div><div style="color:#B0BEC5;font-size:9px">↗ ${C_MAP[p]}</div>`:`<div style="font-weight:${hv?700:400};color:${hv?'#1B5E20':'#37474F'};font-size:11px;word-break:break-word">${p}</div>`;
    let qtyHtml='';
    if(readOnly){qtyHtml=hv?`<div style="text-align:center;font-weight:700;color:${uc}">${raw}<span style="font-size:9px;opacity:.7"> ${ul}</span></div>`:`<div style="text-align:center;color:#CFD8DC">—</div>`;}
    else{qtyHtml=`<div style="display:flex;align-items:center;gap:2px"><input type="number" min="0" step="any" style="width:100%;padding:4px 3px;border:1.5px solid ${hv?(is500?'#CE93D8':'#81C784'):'#E0E0E0'};border-radius:5px;text-align:center;font-size:11px;outline:none;background:${hv?(is500?'#F8F0FF':'#F9FBE7'):'#fff'};font-family:inherit" value="${raw}" placeholder="0" oninput="updItem('${p.replace(/'/g,"\\'")}','${field}',this)"><span style="font-size:9px;color:${uc};font-weight:700;min-width:14px;flex-shrink:0">${ul}</span></div>`;}
    let combHtml='<td style="background:#F5FAFA"></td>';

    h+=`<tr style="background:${is500?'#FDF8FF':(hv?'#F9FBE7':i%2===0?'#fff':'#FAFAFA')};border-bottom:1px solid #F0F0F0"><td style="padding:4px 3px;color:#BDBDBD;font-size:9px;text-align:center">${pidx+1}</td><td style="padding:4px 5px">${nameHtml}</td><td style="padding:3px 4px">${qtyHtml}</td>${combHtml}</tr>`;

}

      <th style="padding:6px 4px;text-align:center;background:#00695C">Combined KG</th>
    </tr></thead><tbody>`;
  vis.forEach((p,i)=>{
    const is500=!!C_MAP[p];const v=totals[p];
    const pidx=PRODUCTS.indexOf(p);
    const dispVal=is500?v.pcs:v.kg;
    const ul=is500?'pcs':'kg';
    const uc=is500?'#7B1FA2':'#1565C0';
    const ck=getTotalKg(totals,p);
    const fp=is500?0:(ck-(v.kg||0));
    const nameHtml=is500?`<div style="color:#7B1FA2;font-size:11px;word-break:break-word">${p}</div><div style="color:#B0BEC5;font-size:9px">↗ ${C_MAP[p]}</div>`:`<div style="font-weight:700;color:#1B5E20;font-size:11px;word-break:break-word">${p}</div>`;
    let combCell='<td style="background:#F5FAFA"></td>';
    if(!is500){combCell=`<td style="padding:4px 4px;text-align:center;background:${ck>0?'#E0F2F1':ck<0?'#FFEBEE':'#F5FAFA'}">${ck!==0?`<div style="font-weight:700;color:${ck>0?'#00695C':'#C62828'};font-size:12px">${ck.toFixed(2)}</div>${fp!==0?`<div style="font-size:9px;color:${fp>0?'#2E7D32':'#C62828'}">${fp>0?'+':''}${fp.toFixed(2)}</div>`:''}`:`<span style="color:#CFD8DC">0</span>`}</td>`;}
    h+=`<tr style="background:${is500?'#FDF8FF':i%2===0?'#fff':'#FAFAFA'};border-bottom:1px solid #F0F0F0"><td style="padding:4px 3px;color:#BDBDBD;font-size:9px;text-align:center">${pidx+1}</td><td style="padding:4px 5px">${nameHtml}</td><td style="padding:4px 4px;text-align:center;font-weight:700;color:${uc}">${dispVal!==0?`${dispVal.toFixed(dispVal%1===0?0:2)} <span style="font-size:9px;opacity:.7">${ul}</span>`:'—'}</td>${combCell}</tr>`;
  });
  h+=`<tr style="background:#263238;color:#fff;font-weight:700"><td colspan="2" style="padding:7px 7px">TOTAL</td><td style="text-align:center">${tKg.toFixed(2)}</td><td style="text-align:center;background:#00695C">${tComb.toFixed(2)}</td></tr>`;
  h+=`</tbody></table></div>`;return h;
}

function renderDiff(){
  const totA=FA.length?calcFormula(FA):null;
  const totB=FB.length?calcFormula(FB):null;

  let h=`<div class="card" style="border:1.5px solid #FFAB91">
    <h2 style="margin:0 0 6px;font-size:16px;color:#BF360C">⚖️ Difference: Formula B − Formula A</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span class="badge" style="background:#EDE7F6;color:#4527A0">🧮 Formula A: ${FA.length} records</span>
      <span class="badge" style="background:#E0F2F1;color:#00695C">🧮 Formula B: ${FB.length} records</span>
    </div>`;

  if(!totA&&!totB){
    h+=`<div style="color:#90A4AE;font-size:12px">Please add records to Formula A and Formula B first.</div></div>`;return h;
  }
  if(!totA){h+=`<div style="color:#C62828;font-size:12px">⚠️ Formula A is empty</div></div>`;return h;}
  if(!totB){h+=`<div style="color:#C62828;font-size:12px">⚠️ Formula B is empty</div></div>`;return h;}
  h+=`</div>`;

  // Build diff
  const diff={};PRODUCTS.forEach(p=>diff[p]={kg:(totB[p]?.kg||0)-(totA[p]?.kg||0),pcs:(totB[p]?.pcs||0)-(totA[p]?.pcs||0)});
  const vis=PRODUCTS.filter(p=>diff[p].kg!==0||diff[p].pcs!==0);
  const grandA=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totA,p),0);
  const grandB=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totB,p),0);
  const grandD=grandB-grandA;

  h+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#BF360C">⚖️ Difference: B − A</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn" style="background:#1B5E20;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaXLSX('diff')">📊 Excel</button>
        <button class="btn" style="background:#1565C0;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaImage('diff')">🖼️ Image</button>
        <button class="btn" style="background:#C62828;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaPDF('diff')">📄 PDF</button>
        <button class="btn" style="background:#25D366;color:#fff;padding:4px 10px;font-size:11px" onclick="shareFormulaWhatsApp('diff')">💬 WhatsApp</button>
      </div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
      <div style="background:#EDE7F6;padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:#4527A0">${grandA.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Formula A</div></div>
      <div style="display:flex;align-items:center;font-size:18px;color:#546E7A">→</div>
      <div style="background:#E0F2F1;padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:#00695C">${grandB.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Formula B</div></div>
      <div style="display:flex;align-items:center;font-size:18px;color:#546E7A">=</div>
      <div style="background:${grandD>0?'#E8F5E9':grandD<0?'#FFEBEE':'#ECEFF1'};padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:${grandD>0?'#2E7D32':grandD<0?'#C62828':'#546E7A'}">${grandD>=0?'+':''}${grandD.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Diff</div></div>
    </div>
    <div style="border-radius:9px;border:1px solid #ECEFF1;overflow:hidden">
    <table style="width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed">
      <colgroup><col style="width:24px"><col><col style="width:75px"><col style="width:75px"><col style="width:85px"></colgroup>
      <thead><tr style="background:#263238;color:#fff">
        <th style="padding:6px 4px;text-align:center">#</th>
        <th style="padding:6px 5px">Product</th>
        <th style="padding:6px 4px;text-align:center;background:#4527A0CC">A<br><small style="font-weight:400;font-size:9px">Comb KG</small></th>
        <th style="padding:6px 4px;text-align:center;background:#00695CCC">B<br><small style="font-weight:400;font-size:9px">Comb KG</small></th>
        <th style="padding:6px 4px;text-align:center;background:#BF360C">B−A<br><small style="font-weight:400;font-size:9px">Diff</small></th>
      </tr></thead><tbody>`;

  const allVis=PRODUCTS.filter(p=>!C_MAP[p]&&(getTotalKg(totA,p)!==0||getTotalKg(totB,p)!==0));
  allVis.forEach((p,i)=>{
    const ckA=getTotalKg(totA,p);
    const ckB=getTotalKg(totB,p);
    const d=ckB-ckA;
    const dColor=d>0?'#1B5E20':d<0?'#B71C1C':'#9E9E9E';
    h+=`<tr style="background:${i%2===0?'#fff':'#FAFAFA'};border-bottom:1px solid #F0F0F0">
      <td style="padding:4px 3px;color:#BDBDBD;font-size:9px;text-align:center">${PRODUCTS.indexOf(p)+1}</td>
      <td style="padding:4px 5px;font-weight:700;color:#1B5E20;font-size:11px;word-break:break-word">${p}</td>
      <td style="padding:4px 4px;text-align:center;color:${ckA!==0?'#4527A0':'#CFD8DC'}">${ckA!==0?ckA.toFixed(2):'—'}</td>
      <td style="padding:4px 4px;text-align:center;color:${ckB!==0?'#00695C':'#CFD8DC'}">${ckB!==0?ckB.toFixed(2):'—'}</td>
      <td style="padding:4px 4px;text-align:center;font-weight:700;color:${dColor};background:${d>0?'#F1F8E9':d<0?'#FFF5F5':'#F5F5F5'}">${d!==0?(d>0?'+':'')+d.toFixed(2):'—'}</td>
    </tr>`;
  });
  const dTotal=grandD;
  h+=`<tr style="background:#263238;color:#fff;font-weight:700">
    <td colspan="2" style="padding:7px 7px">TOTAL</td>
    <td style="text-align:center;background:#4527A0CC">${grandA.toFixed(2)}</td>
    <td style="text-align:center;background:#00695CCC">${grandB.toFixed(2)}</td>
    <td style="text-align:center;background:#BF360C">${dTotal>=0?'+':''}${dTotal.toFixed(2)}</td>
  </tr></tbody></table></div></div>`;
  return h;
}

function handleStockFile(inp){const f=inp.files[0];if(!f)return;const reader=new FileReader();reader.onload=e=>processStockExcel(e.target.result,f.name);reader.readAsArrayBuffer(f);}
function handleStockDrop(e){e.preventDefault();document.getElementById('uz2')?.classList.remove('drag');const f=e.dataTransfer.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>processStockExcel(ev.target.result,f.name);reader.readAsArrayBuffer(f);}

function processStockExcel(buf,name){
  try{
    const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const result=[],converted={};PRODUCTS.forEach(p=>converted[p]=0);
    for(let i=0;i<rows.length;i++){
      const row=rows[i];
      const rname=String(row[0]||'').trim();
      // Parse numeric value from column B (strip units like KG, CTN, PCS)
      const rawB=String(row[1]||'').trim();
      const qty=parseFloat(rawB.replace(/[^0-9.\-]/g,''))||0;
      if(!rname||!qty)continue;
      if(rname.toLowerCase().includes('item')||rname.toLowerCase().includes('balance')||rname.toLowerCase().includes('quantity'))continue;
      const map=lookupStockMap(rname);
      const entry={name:rname,qty,matched:!!map,product:map?map.p:'',multiplier:map?map.m:0,converted:map?(qty*map.m):0};
      result.push(entry);
      if(map&&qty)converted[map.p]=(converted[map.p]||0)+(qty*map.m);
    }
    const today=new Date().toISOString().split('T')[0];
    UPS={step:'result',fileName:name,date:today,notes:'Sys.Stock',rows:result,converted,unmatched:result.filter(r=>!r.matched)};
  }catch(e){alert('Error: '+e.message);UPS.step='upload';}
  render();
}

function saveStockRec(){
  const items=emptyItems();
  PRODUCTS.forEach(p=>{if((UPS.converted[p]||0)>0){if(C_MAP[p])items[p]={kg:'',pcs:UPS.converted[p].toFixed(0)};else items[p]={kg:UPS.converted[p].toFixed(3),pcs:''};}});

  D.stockSummaries=[{id:gid(),date:UPS.date,notes:UPS.notes||UPS.fileName,items:compactItems(items)},...D.stockSummaries];
  save();UPS.step='upload';UPS.rows=[];render();
}

// Excel
function processExcel(buf,name){
  try{
    const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const result=[],converted={},unmatched=[];PRODUCTS.forEach(p=>converted[p]=0);
    let start=1;for(let i=0;i<Math.min(rows.length,5);i++){if(rows[i].some(c=>String(c).toLowerCase().includes('name'))){start=i+1;break;}}
    for(let i=start;i<rows.length;i++){const row=rows[i];const rn=String(row[1]||'').trim();const qty=parseFloat(row[2])||0;if(!rn||rn.toLowerCase()==='total')continue;const map=lookupMap(rn);const entry={name:rn,qty,matched:!!map,product:map?map.p:'',multiplier:map?map.m:0,converted:map?(qty*map.m):0};result.push(entry);if(map&&qty>0)converted[map.p]=(converted[map.p]||0)+(qty*map.m);else if(qty>0)unmatched.push({name:rn,qty});}
    UP={step:'result',fileName:name,date:new Date().toISOString().split('T')[0],rows:result,converted,unmatched};
  }catch(e){alert('Error: '+e.message);UP.step='upload';}render();
}
function handleFile(inp){const f=inp.files[0];if(!f)return;const reader=new FileReader();reader.onload=e=>processExcel(e.target.result,f.name);reader.readAsArrayBuffer(f);}
function handleDrop(e){e.preventDefault();document.getElementById('uz')?.classList.remove('drag');const f=e.dataTransfer.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>processExcel(ev.target.result,f.name);reader.readAsArrayBuffer(f);}
function saveSalesRec(){

}

// ─── Generic HTML capture ───────────────────────────
async function captureHTML(html){
  const div=document.createElement('div');
  div.style.cssText='position:fixed;left:-9999px;top:0;z-index:-999;pointer-events:none';
  div.innerHTML=html;document.body.appendChild(div);
  try{
    const canvas=await html2canvas(div.firstChild,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false});
    document.body.removeChild(div);return canvas;
  }catch(e){document.body.removeChild(div);throw e;}
}

// ═══ STORAGE OPTIMIZATION ════════════════════════════
// Only save non-empty items — reduces size by ~85%
function compactItems(items){
  const c={};
  Object.entries(items||{}).forEach(([k,v])=>{
    if((parseFloat(v.kg)||0)>0||(parseFloat(v.pcs)||0)>0)c[k]=v;
  });
  return c;
}
function expandItems(compact){
  const e=emptyItems();
  Object.entries(compact||{}).forEach(([k,v])=>{if(e[k]!==undefined)e[k]=v;});
  return e;
}
function migrateCompact(){
  // Migrate existing data to compact format on first run
  let changed=false;
  ['inventories','receivables','returns','sales'].forEach(key=>{
    D[key]=D[key].map(r=>{
      const c=compactItems(r.items);
      if(Object.keys(c).length<Object.keys(r.items||{}).length){changed=true;return{...r,items:c};}
      return r;
    });
  });
  if(changed)save();
}

      </tr></thead>

      <tfoot><tr style="background:#263238;color:#fff;font-weight:700">
        <td colspan="2" style="padding:6px 7px;font-size:11px">TOTAL</td>
        <td style="text-align:center;padding:6px 7px;font-size:11px">${totalKg(r).toFixed(2)} kg</td>
        <td style="text-align:center;padding:6px 7px;background:#00695C;font-size:11px">${combTotal.toFixed(2)} kg</td>

    <div style="margin-top:10px;text-align:right;font-size:9px;color:#B0BEC5">
      Generated: ${new Date().toLocaleString()} | Chicken Inventory System
    </div>
  </div>`;
}

async function captureRecord(id){
  const html=buildExportHTML(id);if(!html)throw new Error('Record not found');
  const div=document.createElement('div');
  div.style.cssText='position:fixed;left:-9999px;top:0;z-index:-999;pointer-events:none';
  div.innerHTML=html;document.body.appendChild(div);
  try{
    const canvas=await html2canvas(div.firstChild,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false});
    return{canvas,div};
  }catch(e){document.body.removeChild(div);throw e;}
}

async function exportImage(id){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const{canvas,div}=await captureRecord(id);document.body.removeChild(div);
    const f=findRecord(id);const r=f?.record;
    const url=canvas.toDataURL('image/png');
    const a=document.createElement('a');a.href=url;
    a.download=`inventory-${r?.date||'record'}-${r?.notes||''}.png`.replace(/\s+/g,'-');
    a.click();
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='🖼️';btn.disabled=false;
}

async function exportPDF(id){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const{canvas,div}=await captureRecord(id);document.body.removeChild(div);
    const f=findRecord(id);const r=f?.record;
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pw=pdf.internal.pageSize.getWidth()-20;
    const iw=canvas.width/2;const ih=canvas.height/2;
    const ratio=Math.min(pw/iw*3.7795,280/ih*3.7795);
    const sw=(iw/3.7795)*ratio;const sh=(ih/3.7795)*ratio;
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',10,10,sw,sh);
    pdf.save(`inventory-${r?.date||'record'}-${r?.notes||''}.pdf`.replace(/\s+/g,'-'));
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='📄';btn.disabled=false;
}

async function shareWhatsApp(id){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const{canvas,div}=await captureRecord(id);document.body.removeChild(div);
    const f=findRecord(id);const r=f?.record;
    const fname=`inventory-${r?.date||'record'}.png`;
    canvas.toBlob(async(blob)=>{
      const file=new File([blob],fname,{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Inventory',text:`${r?.date}${r?.notes?' - '+r.notes:''}`});
      } else {
        // Fallback: download then open WhatsApp
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download=fname;a.click();
        URL.revokeObjectURL(url);
        setTimeout(()=>window.open('https://web.whatsapp.com/','_blank'),500);
      }
      btn.textContent='💬';btn.disabled=false;
    },'image/png');
  }catch(e){alert('Error: '+e.message);btn.textContent='💬';btn.disabled=false;}
}

function exportRecordXLSX(id){
  const f=findRecord(id);if(!f)return;
  const{record:r,type:t}=f;
  const inf=TYPE_INFO[t]||{emoji:'📄',label:'Record'};
  const items=expandItems(r.items);
  const rows=[
    ['Chicken Inventory System','','','',''],
    ['','','','',''],
    ['Type:',inf.label,'Date:',r.date,'Notes:',r.notes||''],
    ['','','','',''],
    ['#','Product','Qty','Unit','Combined KG'],
  ];
  PRODUCTS.forEach(p=>{
    const is500=!!C_MAP[p];const val=getVal(items,p);
    if(val>0){
      const ck=getTotalKg(items,p);
      rows.push([PRODUCTS.indexOf(p)+1,p,val,is500?'pcs':'kg',!is500?+ck.toFixed(3):'']);
    }
  });
  rows.push(['','TOTAL KG',+totalKg(r).toFixed(2),'',+PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(items,p),0).toFixed(2)]);
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:32},{wch:10},{wch:8},{wch:15}];
  XLSX.utils.book_append_sheet(wb,ws,inf.label);
  XLSX.writeFile(wb,`${inf.label}-${r.date}${r.notes?'-'+r.notes:''}.xlsx`.replace(/\s+/g,'-'));
}

function importData(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!data.D){alert('Invalid file format');return;}
      if(!confirm('This will REPLACE all current data. Continue?'))return;
      if(data.PRODUCTS){PRODUCTS=data.PRODUCTS;saveProducts();}
      if(data.MD){MD=data.MD;saveMapping();}
      if(data.D){D=data.D;save();}
      FA=data.FA||[];FB=data.FB||[];
      if(data.SMD){SMD=data.SMD;saveStockMapping();}
      saveFormulas();recompute();
      render();alert('Data restored successfully!');
    }catch(ex){alert('Error: '+ex.message);}
    input.value='';
  };
  reader.readAsText(f);
}
